# Example reverse proxy: HTTPS + static site + /api → FastAPI
# (Production wonderbaboon.com uses Hostinger — see deploy/HOSTINGER.md and frontend/.htaccess)
# Replace YOUR_DOMAIN and upstream port; install TLS certs (e.g. certbot).

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    root /var/www/wonder-baboon/frontend;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5051/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Short cache for JS so imported modules (e.g. trip-itineraries.js) update after deploy.
    location /js/ {
        add_header Cache-Control "public, max-age=300";
    }

    # Redirect legacy .html URLs to clean paths (bookmark / search friendly)
    location = /index.html {
        return 301 /$is_args$args;
    }
    location ~ ^/(.+)\.html$ {
        return 301 /$1$is_args$args;
    }

    # Extensionless pages: /upcoming-trips → upcoming-trips.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
